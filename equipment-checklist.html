<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HITH Equipment Checklist — By Procedure</title>
<style>
:root{
  --navy:#0D2D5E; --navy-mid:#164080; --blue:#1A6FAF; --blue-lt:#E5F0FA;
  --bg:#EEF2F7; --surface:#FFFFFF;
  --amber:#C97A00; --amber-bg:#FFFBEB; --amber-bd:#FDE68A;
  --red:#C91B1B; --red-bg:#FEF2F2; --red-bd:#FEB4B4;
  --green:#14803D; --green-bg:#F0FDF4; --green-bd:#A7F3C3;
  --teal:#1c5d5a; --teal-lt:#dcebe9;
  --muted:#5b6663; --border:#DDE3EC; --text:#1B2333; --r:14px; --r-sm:8px;
  --shadow:0 2px 10px rgba(13,45,94,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.45;
  -webkit-text-size-adjust:100%; padding-bottom:60px;
}

/* ---- Header ---- */
header{
  position:sticky; top:0; z-index:50; background:var(--navy); color:#fff;
  padding:14px 16px 0; box-shadow:0 2px 10px rgba(13,45,94,0.2);
}
.eyebrow{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.09em; color:#9FC1E8; margin-bottom:2px;}
header h1{margin:0; font-size:1.15rem; font-weight:700;}
header .sub{font-size:0.75rem; color:#C7D9F0; margin-top:2px;}

/* ---- Procedure chip rail ---- */
.proc-rail{
  display:flex; gap:7px; overflow-x:auto; padding:11px 0 13px;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.proc-rail::-webkit-scrollbar{display:none;}
.proc-chip{
  flex:0 0 auto; background:rgba(255,255,255,0.09); color:#EAF1FB;
  border:1px solid rgba(255,255,255,0.18); border-radius:999px;
  padding:8px 13px; font-size:0.8rem; font-weight:600;
  white-space:nowrap; cursor:pointer;
  display:flex; align-items:center; gap:6px;
  -webkit-tap-highlight-color:transparent;
}
.proc-chip.active{background:#fff; color:var(--navy); border-color:#fff;}

/* ---- Main content ---- */
main{max-width:760px; margin:0 auto; padding:14px 12px 10px;}

/* ---- Banner ---- */
.banner{
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; margin-bottom:14px;
}
.banner-title{font-size:1.0rem; font-weight:800; color:var(--navy); margin:0 0 1px;}
.banner-sub{font-size:0.75rem; color:var(--muted);}
.banner-reset{
  flex:0 0 auto; background:#fff; border:1.5px solid var(--border);
  color:var(--navy); border-radius:var(--r-sm); padding:8px 12px;
  font-size:0.8rem; font-weight:700; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.banner-reset:active{background:var(--bg);}

/* ---- Alert boxes ---- */
.alert{
  border-radius:var(--r); padding:11px 14px; margin:0 0 14px;
  font-size:0.87rem; border:1px solid transparent;
}
.alert.red{background:var(--red-bg); border-color:#feb4b4; color:#7a1a1a;}
.alert.amber{background:var(--amber-bg); border-color:var(--amber-bd); color:#7a4900;}
.alert strong{display:block; margin-bottom:2px; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.08em;}

/* ---- Group cards (fruse-05 style) ---- */
.card{
  background:#fff; border:1px solid var(--border); border-radius:var(--r);
  padding:14px 14px; margin-bottom:12px; box-shadow:var(--shadow);
}

.group-header{
  display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;
}
.group-header h3{margin:0; font-size:0.95rem; color:var(--navy);}
.group-header .count{
  font-size:0.72rem; color:var(--muted); background:#f3ecdd;
  border-radius:999px; padding:2px 9px; font-weight:700;
}
.group-header .count.done{background:var(--green-bg); color:var(--green);}

/* ---- Check items (fruse-05 style) ---- */
.check-item{
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 4px; border-bottom:1px solid var(--border);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.check-item:last-child{border-bottom:none;}
.check-item input[type=checkbox]{
  appearance:none; -webkit-appearance:none;
  width:24px; height:24px; min-width:24px;
  border:2px solid var(--teal); border-radius:7px;
  margin-top:1px; cursor:pointer; position:relative; background:#fff;
  flex-shrink:0;
}
.check-item input[type=checkbox]:checked{background:var(--teal);}
.check-item input[type=checkbox]:checked::after{
  content:""; position:absolute; left:6px; top:2px;
  width:7px; height:12px; border:solid #fff; border-width:0 3px 3px 0;
  transform:rotate(45deg);
}
.check-item label{font-size:0.92rem; flex:1; cursor:pointer;}
.check-item.checked label{color:var(--muted); text-decoration:line-through;}
.check-item .sub{
  display:block; font-size:0.77rem; color:var(--muted);
  font-weight:400; text-decoration:none; margin-top:2px;
}
.check-item.warn input[type=checkbox]{border-color:var(--amber);}
.check-item.warn label{color:#7a4900;}
.check-item.warn .sub{color:var(--amber);}

/* ---- Copy button ---- */
.copy-row{display:flex; justify-content:center; margin-top:18px;}
.copy-btn{
  background:var(--navy); color:#fff; border:none;
  border-radius:var(--r-sm); padding:13px 28px;
  font-size:0.9rem; font-weight:700; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:active{opacity:0.85;}

/* ---- Toast ---- */
.toast{
  position:fixed; left:50%; bottom:24px;
  transform:translateX(-50%) translateY(20px); opacity:0;
  background:var(--navy); color:#fff; font-size:0.82rem; font-weight:600;
  padding:10px 18px; border-radius:999px;
  box-shadow:0 4px 14px rgba(13,45,94,0.3);
  transition:all .2s; pointer-events:none; z-index:100; white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="eyebrow">SVHM HITH &amp; Community Nursing</div>
  <h1>Equipment Checklist</h1>
  <div class="sub">Select a procedure — all groups visible below</div>
  <div class="proc-rail" id="procRail"></div>
</header>

<main id="main"></main>

<div class="toast" id="toast"></div>

<script>
const GROUP_DEFS = {
  iv:      "IV / infusion equipment",
  med:     "Medication &amp; preparation",
  ppe:     "PPE, sharps &amp; waste",
  monitor: "Patient monitoring &amp; vitals",
  bloods:  "Pathology / bloods",
  assess:  "Assessment / testing tools",
  doc:     "Documentation &amp; paperwork",
  other:   "Additional / situational items",
};

const PROCEDURES = {
  ivmp:{
    label:"Methylpred IV", icon:"💉",
    title:"IV Methylprednisolone",
    sub:"Optic neuritis pulse protocol — pack before leaving base",
    alert:{type:"amber", title:"Anaphylaxis kit", text:"Adrenaline, antihistamine &amp; hydrocortisone must remain immediately accessible throughout the entire infusion."},
    groups:{
      iv:[
        {l:"Methylprednisolone sodium succinate 1 g vial", s:"Solu-Medrol or generic — confirm against drug chart"},
        {l:"NaCl 0.9% 100 mL infusion bag", s:"Or as per prescriber order"},
        {l:"IV administration set (standard — gravity or pump)"},
        {l:"NaCl 0.9% pre-filled flush syringes 10 mL × 2"},
        {l:"IV cannula 18–20G", s:"In case of re-site"},
        {l:"Tourniquet · alcohol/CHG swabs · IV dressing (Tegaderm)"},
        {l:"IV cannula removal dressing kit", s:"For final visit / discharge"},
      ],
      ppe:[
        {l:"Non-sterile gloves (multiple pairs)"},
        {l:"Portable sharps container"},
        {l:"Clinical waste bag"},
      ],
      monitor:[
        {l:"BP cuff · pulse oximeter · thermometer"},
        {l:"Point-of-care glucometer · strips · lancets"},
      ],
      bloods:[
        {l:"Vacutainer · U&amp;E tubes · patient labels · pathology request form"},
      ],
      assess:[
        {l:"Visual acuity testing card / chart", s:"When indicated"},
      ],
      doc:[
        {l:"HITH drug chart · clinical notes · observation chart"},
        {l:"Discharge / transfer-of-care paperwork", s:"For RVEEH on final visit"},
      ],
      other:[
        {l:"Anaphylaxis kit (adrenaline, antihistamine, hydrocortisone)", w:true, s:"⚠ Must be immediately accessible throughout the entire infusion"},
      ],
    }
  },
  fruse:{
    label:"Frusemide infusion", icon:"🫗",
    title:"Frusemide Infusion",
    sub:"Heart failure home IV diuresis — pack before leaving base",
    groups:{
      iv:[
        {l:"REM Bodyguard infusion pump", s:"+ charger / spare battery"},
        {l:"REM Bodyguard giving set (dedicated line)"},
        {l:"Furosemide infusion bag", s:"Pharmacy pre-prepared, or NaCl bag + ampoules to prepare on visit"},
        {l:"0.9% sodium chloride 100 mL bag", s:"If preparing bag on visit"},
        {l:"Saline flushes"},
        {l:"Syringes &amp; 21G (or finer) drawing-up needles", s:"For preparing furosemide bag"},
      ],
      bloods:[
        {l:"Vacutainers — UEC / CMP / LFT (+ TFT if Day 1)"},
        {l:"Pathology request form (completed)"},
        {l:"Specimen transport / cooler bag"},
        {l:"Patient ID labels"},
      ],
      monitor:[
        {l:"Weigh scales", s:"Use same set each day"},
        {l:"Blood pressure monitor"},
        {l:"Thermometer &amp; SpO₂ probe"},
        {l:"Heart Failure Fluid Balance Booklet"},
      ],
      other:[
        {l:"Potassium pack in car", s:"2 × sachets of 5 KCl SR 600 mg tablets, OR 1 × bottle Chlorvescent® tablets"},
      ],
    }
  },
  va:{
    label:"Visual acuity", icon:"👁️",
    title:"Visual Acuity Testing",
    sub:"LogMAR / lorgnette home visit kit",
    groups:{
      assess:[
        {l:"LogMAR chart"},
        {l:"Matching chart"},
        {l:"VA recording sheet"},
        {l:"Pinhole occluder"},
        {l:"Tape measure"},
        {l:"Painter's tape", s:"For marking 3 m / 1.5 m test distance on floor"},
        {l:"Torch"},
      ],
      monitor:[
        {l:"BGL meter"},
        {l:"BGL strips"},
        {l:"Ketone strips"},
      ],
    }
  },
  abpi:{
    label:"ABPI", icon:"🦵",
    title:"ABPI Assessment",
    sub:"Ankle–brachial pressure index — peripheral artery / compression safety screen",
    groups:{
      assess:[
        {l:"Doppler probe (8–10 MHz)"},
        {l:"Sphygmomanometer", s:"With cuffs appropriate for arm and ankle measurement"},
        {l:"Ultrasound gel"},
      ],
      other:[
        {l:"Protective barrier (e.g. plastic wrap)", s:"Cover wounds or ulcers at cuff site before applying cuff"},
      ],
    }
  },
  alteplase:{
    label:"Alteplase SbS", icon:"🧬",
    title:"Alteplase — CVAD Occlusion",
    sub:"Thrombotic / complete occlusion step-by-step",
    groups:{
      iv:[
        {l:"Alteplase — 10 mL syringe pre-filled or vial for reconstitution"},
        {l:"10 mL luer lock syringes (additional)"},
        {l:"Sodium chloride 0.9%", s:"For post-alteplase flush"},
        {l:"Blunt drawing-up needle"},
        {l:"IV medication label"},
        {l:"3-way tap", s:"Complete occlusion only — negative pressure technique"},
        {l:"Needleless connector/s", s:"Complete occlusion only"},
      ],
      ppe:[
        {l:"Non-sterile gloves"},
        {l:"CHG/IPA 2%/70% swabs"},
        {l:"PPE as required"},
      ],
      other:[
        {l:"Procedure tray"},
        {l:"Tray cleaning agent"},
      ],
    }
  },
};

// ---- State ----
let currentProc = Object.keys(PROCEDURES)[0];
const storeKey = p => "hith-equip-v2::" + p;
const loadState = p => { try{return JSON.parse(localStorage.getItem(storeKey(p))||"{}")}catch{return{}} };
const saveState = (p, s) => localStorage.setItem(storeKey(p), JSON.stringify(s));

// ---- Build chip rail ----
function buildRail(){
  const rail = document.getElementById("procRail");
  rail.innerHTML = "";
  Object.keys(PROCEDURES).forEach(key => {
    const p = PROCEDURES[key];
    const btn = document.createElement("button");
    btn.className = "proc-chip" + (key === currentProc ? " active" : "");
    btn.innerHTML = `<span>${p.icon}</span>${p.label}`;
    btn.addEventListener("click", () => { currentProc = key; buildRail(); renderMain(); });
    rail.appendChild(btn);
  });
}

// ---- Render main ----
function renderMain(){
  const proc = PROCEDURES[currentProc];
  const state = loadState(currentProc);
  const main = document.getElementById("main");
  main.innerHTML = "";

  // Banner
  const banner = el("div","banner");
  const bannerL = el("div");
  bannerL.innerHTML = `<p class="banner-title">${proc.title}</p><p class="banner-sub">${proc.sub}</p>`;
  const resetBtn = el("button","banner-reset");
  resetBtn.textContent = "↺ Uncheck all";
  resetBtn.addEventListener("click", () => {
    if(confirm("Uncheck all items for " + proc.title + "?")){ saveState(currentProc,{}); renderMain(); }
  });
  banner.appendChild(bannerL);
  banner.appendChild(resetBtn);
  main.appendChild(banner);

  // Optional alert
  if(proc.alert){
    const a = el("div","alert " + proc.alert.type);
    a.innerHTML = `<strong>${proc.alert.title}</strong>${proc.alert.text}`;
    main.appendChild(a);
  }

  // Groups
  Object.keys(GROUP_DEFS).forEach(gKey => {
    const items = proc.groups[gKey];
    if(!items) return;

    const card = el("div","card");
    const hdr = el("div","group-header");
    const h3 = el("h3"); h3.innerHTML = GROUP_DEFS[gKey];
    const count = el("span","count");
    count.dataset.g = gKey;
    hdr.appendChild(h3); hdr.appendChild(count);
    card.appendChild(hdr);

    items.forEach((it, idx) => {
      const id = `${currentProc}_${gKey}_${idx}`;
      const row = el("div","check-item" + (it.w ? " warn" : "") + (state[id] ? " checked" : ""));
      row.dataset.id = id;
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = "cb_" + id;
      cb.checked = !!state[id];
      cb.addEventListener("change", () => {
        const s = loadState(currentProc);
        s[id] = cb.checked;
        saveState(currentProc, s);
        row.classList.toggle("checked", cb.checked);
        refreshCount(gKey, proc.groups[gKey]);
      });
      const lbl = document.createElement("label");
      lbl.htmlFor = "cb_" + id;
      lbl.innerHTML = it.l + (it.s ? `<span class="sub">${it.s}</span>` : "");
      row.appendChild(cb); row.appendChild(lbl);
      card.appendChild(row);
    });

    main.appendChild(card);
    refreshCount(gKey, items);
  });

  // Copy button
  const copyRow = el("div","copy-row");
  const copyBtn = el("button","copy-btn");
  copyBtn.textContent = "Copy list to clipboard";
  copyBtn.addEventListener("click", copyList);
  copyRow.appendChild(copyBtn);
  main.appendChild(copyRow);
}

function refreshCount(gKey, items){
  const el2 = document.querySelector(`.count[data-g="${gKey}"]`);
  if(!el2) return;
  const state = loadState(currentProc);
  const done = items.filter((_,i) => state[`${currentProc}_${gKey}_${i}`]).length;
  el2.textContent = done + "/" + items.length;
  el2.className = "count" + (done === items.length ? " done" : "");
}

function copyList(){
  const proc = PROCEDURES[currentProc];
  const state = loadState(currentProc);
  let out = proc.title + " — Equipment Checklist\n";
  out += proc.sub + "\n";
  Object.keys(GROUP_DEFS).forEach(gKey => {
    const items = proc.groups[gKey];
    if(!items) return;
    out += "\n" + GROUP_DEFS[gKey].replace(/&amp;/g,"&") + ":\n";
    items.forEach((it, idx) => {
      const done = state[`${currentProc}_${gKey}_${idx}`];
      out += (done ? "[✓] " : "[ ] ") + it.l.replace(/&amp;/g,"&") + "\n";
    });
  });
  navigator.clipboard.writeText(out)
    .then(() => showToast("Copied to clipboard ✓"))
    .catch(() => showToast("Copy failed — please select text manually"));
}

function el(tag, cls){ const e = document.createElement(tag); if(cls) e.className = cls; return e; }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1900);
}

buildRail();
renderMain();
</script>
</body>
</html>
